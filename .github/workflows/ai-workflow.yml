name: 'AI inference'
# https://qiita.com/tsuzuki_takaaki/items/b2d3624bf18cbd9f254e

on: [workflow_dispatch, push]

env: 
  VAL: "Hello, world!"

jobs:
  inference:
    permissions:
      contents: read # ファイル読み取りに必要
      models: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # リポジトリのファイルをワークスペースに展開

      # ==================================
      - name: Read file content
        id: read_file
        # 例として main.py を読み込む場合
        run: |
          # 境界文字はEOFじゃなくてもよい
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64 | tr -dc 'a-zA-Z0-9')
          echo "FILE_CONTENT<<$EOF" >> $GITHUB_ENV
          cat apps/sikaku_siken/toan.html >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV  # ←重要：ファイルの末尾に強制的に改行を入れる
          echo "$EOF" >> $GITHUB_ENV

      - name: Review Program
        id: inference
        uses: actions/ai-inference@v2
        with:
          prompt: |
            以下のファイルをレビューし、改善点やバグの可能性を指摘してください。
            
            ファイル名: main.py
            内容:
            ${{ env.FILE_CONTENT }}

      - name: Print Output
        id: output
        # 修正箇所: 変数展開によるエラーを防ぐため、printf か heredoc を検討しますが
        # 最も安全にログに出すには、一度環境変数に入れてから cat するのが定石です。
        run: |
          cat <<'EOF_LOG'
          ${{ steps.inference.outputs.response }}
          EOF_LOG

      # ==================================
      - name: Read file content2
        id: read_file2
        # 例として main.py を読み込む場合
        run: |
          # 境界文字はEOFじゃなくてもよい
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64 | tr -dc 'a-zA-Z0-9')
          echo "FILE_CONTENT<<$EOF" >> $GITHUB_ENV
          cat temp/test.xml >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV  # ←重要：ファイルの末尾に強制的に改行を入れる
          echo "$EOF" >> $GITHUB_ENV

      - name: Review Program2
        id: inference2
        uses: actions/ai-inference@v2
        with:
          prompt: |
            以下のXMLはあるテストのレポートになります。
            これを解析して、テストの結果を要約してください。
            また、グラフィカルなレポートをHTML形式のコードで作成してください。
            
            ファイル名: temp/test.xml
            内容:
            ${{ env.FILE_CONTENT }}

      - name: Print Output
        id: output2
        # 修正箇所: 変数展開によるエラーを防ぐため、printf か heredoc を検討しますが
        # 最も安全にログに出すには、一度環境変数に入れてから cat するのが定石です。
        run: |
          cat <<'EOF_LOG'
          ${{ steps.inference2.outputs.response }}
          EOF_LOG